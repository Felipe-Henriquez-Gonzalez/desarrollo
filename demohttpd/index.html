<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Red Hat Ansible Automation Platform Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #151515;
      color: white;
      text-align: center;
    }

    header {
      background: #ee0000;
      padding: 30px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
    }

    .container {
      padding: 60px 20px;
    }

    .card {
      background: #222;
      border-radius: 12px;
      padding: 30px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .ansible {
      font-size: 80px;
      margin-bottom: 20px;
    }

    footer {
      margin-top: 50px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Red Hat Ansible Automation Platform</div>
  </header>

  <div class="container">
    <div class="card">
      <div class="ansible">Ⓐ</div>
      <h1>Demo publicada con Ansible</h1>
      <p>
        Esta página fue desplegada automáticamente sobre Apache HTTP Server
        usando un Playbook de Ansible.
      </p>
      <p>
        Host destino configurable mediante variable.
      </p>
    </div>

    <footer>
      Powered by Red Hat Ansible Automation Platform
    </footer>
  </div>

</body>
</html>
