---
- name: Deploy Apache Demo desde GitHub
  hosts: "{{ target_host }}"
  become: true

  vars:
    git_repo_url: "https://github.com/Felipe-Henriquez-Gonzalez/demoapache.git"
    git_checkout_dir: "/tmp/demoapache"

    application_name: "AAP Apache Demo"
    environment: "LAB"

  tasks:

    - name: Instalar paquetes requeridos
      ansible.builtin.dnf:
        name:
          - httpd
          - git
        state: present

    - name: Iniciar y habilitar Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Clonar o actualizar repositorio demoapache
      ansible.builtin.git:
        repo: "{{ git_repo_url }}"
        dest: "{{ git_checkout_dir }}"
        version: main
        force: true
        update: true

    - name: Generar página desde template Jinja2
      ansible.builtin.template:
        src: "{{ git_checkout_dir }}/templates/index.html.j2"
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: "0644"

    - name: Reiniciar Apache
      ansible.builtin.service:
        name: httpd
        state: restarted
